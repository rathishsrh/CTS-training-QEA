        //JS

        


        function checkSleepDuration()
        {
        let name = document.getElementById('name').value();
        let age= document.getElementById('age').value();
        let lifestyle=document.getElementById('lifestyle').value();
        let sleepwindow=document.getElementById('sleepwindow').value();


        let sleephours=calculateRecommendedSleep(age,lifestyle);
        let feedback=getSleepDurationFeedback(sleepwindow,sleephours);

        document.getElementById('sleepResult').innerHTML=`Hi ${name} you slept for ${sleepwindow}. feedback is${feedback}`;
        }
        


        function calculateRecommendedSleep(age,lifestyle)
        {
            if(age<18)
            {
                if(lifestyle=='sedenary')
                {
                    return 9+1;
                }
                if(lifestyle=='veryactive')
                {
                    return 9-1;
                }
                return 9;
            }
            if(age>60)
            {
                if(lifestyle=='sedenary')
                {
                    return 7+1;
                }
                if(lifestyle=='veryactive')
                {
                    return 7-1;
                }
                return 7;
            }
            if(age>18 && age<60)
            {
                if(lifestyle=='sedenary')
                {
                    return 8+1;
                }
                if(lifestyle=='veryactive')
                {
                    return 8-1;
                }
                return 8;
            }
        }

        function getSleepDurationFeedback(sleepwindow,sleephours)
        {
            if(sleephours==0)
            {
                return "not slept";
            }
            if(sleephours==sleepwindow)
            {
                return "great";
            }
            if(sleephours<sleepwindow)
            {
                let need=sleephours-sleepwindow;
                return `you need to sleep ${need} hours`;
            }
            if(sleephours>sleepwindow)
            {
                let need=sleephours-sleepwindow;
                return `you need to sleep ${Math.abs(need)} hours`;
            }

        }
